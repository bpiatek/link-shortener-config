spring.flyway.enabled=true
spring.threads.virtual.enabled=true

spring.boot.admin.client.url=http://link-shortener-spring-admin-dev-helm:8080

management.endpoints.web.exposure.include=*
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=ALWAYS

management.health.mail.enabled=false
management.health.diskspace.enabled=false
management.health.ping.enabled=false

management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,vault
management.endpoint.env.show-values=ALWAYS
management.endpoint.configprops.show-values=ALWAYS
management.endpoint.logfile.access=read_only

logging.file.name=/tmp/log.log

# Credentials for the CLIENT to register itself
spring.boot.admin.client.username=${monitoring.user.name}
spring.boot.admin.client.password=${monitoring.user.password}

# Credentials for the SERVER to use for health checks
spring.boot.admin.client.instance.metadata.user.name=${monitoring.user.name}
spring.boot.admin.client.instance.metadata.user.password=${monitoring.user.password}
spring.boot.admin.client.instance.service-base-url=http://${POD_IP:localhost}:8080

scraper.alert.price-threshold=10000
scraper.alert.recipient-email=piatekbart@gmail.com
scraper.conversion.eur-to-pln=4.22
scraper.schedule.rate=PT1H
scraper.reconciliation.delist-grace-period=12h
scraper.concurrency.max-parallel=1

scraper.playwright.headless=true
scraper.playwright.viewport-width=1920
scraper.playwright.viewport-height=1080
scraper.playwright.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0 Safari/537.36
scraper.playwright.launch-args=--disable-blink-features=AutomationControlled,--no-sandbox,--disable-infobars

scraper.playwright.navigation-timeout=15s
scraper.playwright.action-timeout=10s
scraper.playwright.browser-launch-timeout=20s
scraper.playwright.page-ready-timeout=10s
scraper.execution.per-store-timeout=45s

app.mail.from=scraper@bpiatek.pl
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s